name: Feature request
description: Propose a PM_App change.
title: "feat(app): "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, safety, or business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Auth/account setup
        - Profile/verification
        - Matching/discovery
        - Messaging/safety
        - Notifications
        - Supabase/backend
        - Build/release workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
