name: PM_App CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      run_live_supabase_proof:
        description: "Run linked Supabase migration proof using configured repo secrets"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: pm-app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PM_App CI
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      EXPO_PUBLIC_BETA_DEMO_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Source and launch contracts
        run: npm run check:source-contracts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Unit tests
        run: npm test -- --runInBand --no-cache

      - name: Web export
        run: npm run build:web

  live-supabase-proof:
    name: Supabase live proof
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_supabase_proof == 'true' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify live proof configuration
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is required for live Supabase proof." >&2
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "SUPABASE_PROJECT_REF repository variable is required for live Supabase proof." >&2
            exit 1
          fi

      - name: Supabase CLI version
        run: npx -y supabase@latest --version

      - name: Link Supabase project
        run: npx -y supabase@latest link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Migration history
        run: npx -y supabase@latest migration list --linked

      - name: Migration dry run
        run: npx -y supabase@latest db push --dry-run --linked
